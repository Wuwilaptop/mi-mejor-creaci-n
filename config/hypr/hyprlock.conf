# ==========================================
# HYPRLOCK CONFIGURATION BY GEMINI
# ==========================================

background {
    monitor =
    # Usamos tu wallpaper actual para mantener la estética
    path = /home/javier/.config/hypr/wallpaper.png  # Ajustá la ruta exacta a tu wallpaper actual si es otra
    color = rgba(10, 10, 15, 1.0)

    # Efecto de desenfoque suave para que resalten las fuentes del lockscreen
    blur_passes = 2
    blur_size = 4
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# --- RELOJ ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 95
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# --- FECHA ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d de %B")"
    color = rgba(170, 175, 190, 0.8)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

# --- INPUT DE CONTRASEÑA ---
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 3
    dots_size = 0.25 # Escala de los puntos del input
    dots_spacing = 0.40 # Espaciado de los puntos
    dots_center = true
    dots_rounding = -1
    
    # Colores combinando con el look metálico/oscuro
    outer_color = rgba(40, 44, 52, 0.5)
    inner_color = rgba(20, 22, 26, 0.6)
    font_color = rgba(242, 243, 244, 0.9)
    fade_on_empty = true
    fade_timeout = 1000
    
    placeholder_text = <i>Ingresa tu contraseña...</i>
    hide_input = false
    rounding = 12
    
    # Colores de estado
    check_color = rgba(173, 216, 230, 0.8) # Tono azulado al verificar
    fail_color = rgba(255, 107, 107, 0.8) # Rojo si falla
    fail_text = <i>Contraseña incorrecta ($ATTEMPTS)</i>
    fail_transition = 300
    
    position = 0, -50
    halign = center
    valign = center
}

# --- DETALLE USERNAME ---
label {
    monitor =
    text = Hola, $USER
    color = rgba(170, 175, 190, 0.6)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -120
    halign = center
    valign = center
}
